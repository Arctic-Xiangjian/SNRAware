name: Build Containers
on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
  workflow_call:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
jobs:
  build-containers:
    runs-on: "ubuntu-24.04"
    steps:
      # Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          fetch-tags: true
      - uses: ./.github/actions/setup-environment
        id: runner-context
      # Build the Docker image
      - name: Build Docker Image
        run: |
          uv version "$PACKAGE_VERSION" --no-sync
          echo "building image: snraware:${PACKAGE_VERSION}"
          docker build -f Containerfile -t snraware:${PACKAGE_VERSION} .
          echo "testing installation in image"
          docker run snraware:${PACKAGE_VERSION} python -c "import snraware"
        env:
          PACKAGE_VERSION: "${{ steps.runner-context.outputs.package-version }}"
