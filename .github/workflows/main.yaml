name: Main
on:
  push:
    branches: [ "main" ]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      sha:
        description: 'the git sha to checkout'
        required: true
        type: string
permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write
  pages: write
  security-events: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  checks:
    uses: ./.github/workflows/checks.yaml
    secrets: inherit
    with:
      sha: ${{ inputs.sha || github.sha }}
  build-docs:
    uses: ./.github/workflows/build-docs.yaml
    secrets: inherit
    with:
      sha: ${{ inputs.sha || github.sha }}
  codeql:
    uses: ./.github/workflows/codeql.yaml
    secrets: inherit
    with:
      sha: ${{ inputs.sha || github.sha }}
  auto-merge:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/auto-merge.yaml
    secrets: inherit
  release:
    uses: ./.github/workflows/release.yaml
    secrets: inherit
    needs:
      - build-docs
      - checks
      - codeql
    with:
      publish-docs: ${{ github.ref_name == 'main' }}