site_name: SNRAware
repo_url: "https://github.com/microsoft/SNRAware"
repo_name: "SNRAware"
docs_dir: "docs"
site_dir: "dist/site"
theme:
  name: material
  logo: images/logo.png
  favicon: images/favicon.ico
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github-alt
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - navigation.top
extra_css:
  - css/extra.css
extra_javascript:
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
watch:
  - "src"
plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - "src"
          options:
            show_if_no_docstring: true
            show_symbol_type_toc: true
            show_symbol_type_heading: true
            show_signature_annotations: false
            group_by_category: true
            show_category_heading: false  # adds a lot of nesting in TOC navs
            show_root_heading: true  # adds nice grouping on pages showing more than one element
            signature_crossrefs: true
            merge_init_into_class: true
            annotations_path: source
            members_order: source
          inventories:
            - "https://docs.python.org/3/objects.inv"
  - awesome-pages
  - mkdocs-video:
      is_video: true
      video_controls: true
markdown_extensions:
  # Allows for nicely styled notes and warnings: !!! note
  - admonition
  # Allows for adding attributes to markdown content: !(some-image){: align=left }
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # https://facelessuser.github.io/pymdown-extensions/extensions/snippets/#snippets-notation
      base_path:
        # can include anything from root of repo
        - !relative $config_dir
      # fail the mkdocs build if any snippets link to missing files
      # this delays painful bugs being found late
      check_paths: true
  - pymdownx.magiclink
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - def_list # definition / description lists
  - pymdownx.tasklist: # Allows us to make a Tasklist: [x] some checked thing
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  # See: https://github.com/mkdocs/mkdocs/issues/545
  - mdx_truly_sane_lists
