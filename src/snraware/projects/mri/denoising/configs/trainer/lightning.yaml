_target_: lightning.Trainer

max_epochs: 120

precision: 32

devices: "auto"
accelerator: "auto"
strategy: "auto" # auto or fsdp
num_nodes: 1

gradient_clip_val: 1.0
accumulate_grad_batches: 1

log_every_n_steps: 5
enable_progress_bar: true
enable_model_summary: true
enable_checkpointing: true

check_val_every_n_epoch: ${logging.save_ckpt_every_n_epochs}
val_check_interval: 1.0

fast_dev_run: false
overfit_batches: 0.0
limit_train_batches: 1.0
limit_val_batches: 1.0
limit_test_batches: 1.0

deterministic: false
benchmark: true
profiler: null